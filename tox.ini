[tox]
# Define all test environments
envlist =
    py312
    py38
    py39
    py310
    py311
    py313
    lint
    type-check

# Fail fast if any environment fails (change to False for full test report)
fail_fast = False

# Skip interpreters that are not installed
skip_missing_interpreters = True

# Use the source project directly without building an sdist
isolated_build = True

# Minimum tox version required
minversion = 3.20.0

[testenv]
# Base test environment for all Python versions

description = Run unit tests with pytest

# Install test dependencies
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    -r requirements.txt


# Change to the source directory
changedir = {toxinidir}

# Test discovery - run tests from tests/ directory
commands =
    pytest {posargs:tests/} \
        --verbose \
        --cov=src/meteoswiss \
        --cov-report=term-missing \
        --cov-report=html:{envdir}/htmlcov \
        --cov-report=xml:{envdir}/coverage.xml \
        --tb=short

# Set working directory
setenv =
    PYTHONPATH = {toxinidir}/src

# Ensure consistent Python path handling
passenv =
    HOME
    USER
    CI
    GITHUB_*

[testenv:py38]
# Python 3.8 specific environment
basepython = python3.8

[testenv:py39]
# Python 3.9 specific environment
basepython = python3.9

[testenv:py310]
# Python 3.10 specific environment
basepython = python3.10

[testenv:py311]
# Python 3.11 specific environment
basepython = python3.11

[testenv:py312]
# Python 3.12 specific environment
basepython = python3.12

[testenv:py313]
# Python 3.13 specific environment
basepython = python3.13

[testenv:lint]
# Lint environment - runs ruff checks

description = Lint code with Ruff

skip_install = True

deps =
    ruff>=0.1.0

commands =
    ruff check . {posargs}
    ruff format . --check --diff

[testenv:type-check]

description = Type check with mypy

skip_install = False

deps =
    mypy>=1.0.0
    types-requests
    pandas-stubs
    -r requirements.txt

commands =
    mypy src/meteoswiss --ignore-missing-imports --no-error-summary {posargs} --no-strict-optional --allow-untyped-defs  --check-untyped-defs --allow-incomplete-defs


[testenv:format]

description = Format code with Ruff

skip_install = True

deps =
    ruff>=0.1.0

commands =
    ruff format . {posargs}

[testenv:dev]
# Development environment with all tools installed

description = Development environment with all testing/linting tools

usedevelop = True

deps =
    {[testenv]deps}
    {[testenv:lint]deps}
    pytest-xdist
    pytest-timeout
    ipython
    ipdb

commands =
    python -c "print('Development environment ready. Run pytest or ruff commands.')"

# GitHub Actions integration
[gh-actions]
# Map GitHub Actions Python versions to tox environments
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[pytest]
# Pytest configuration

# Minimum Python version supported
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --strict-markers
    --strict-config
    --tb=short

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage options
[coverage:run]
source = meteoswiss
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstract

precision = 2
skip_covered = False

[coverage:html]
directory = htmlcov
